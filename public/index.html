<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Souz Proxy</title>
    <style>
        :root {
            color-scheme: light;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4efe6;
            color: #1f2933;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top left, rgba(185, 122, 87, 0.18), transparent 35%),
                linear-gradient(135deg, #f7f1e7, #f3e7d3 55%, #efe2cb);
        }

        main {
            width: min(680px, calc(100vw - 32px));
            padding: 32px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.82);
            box-shadow: 0 24px 80px rgba(31, 41, 51, 0.12);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1;
        }

        p {
            margin: 0 0 12px;
            line-height: 1.6;
        }

        code {
            font-family: "SFMono-Regular", ui-monospace, monospace;
            background: rgba(31, 41, 51, 0.08);
            padding: 0.15rem 0.35rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<main>
    <h1>Souz Proxy</h1>
    <p>This container serves the authenticated proxy surface for Souz backend traffic.</p>
    <p>Mount or replace the contents of <code>/app/public</code> with the production web build to serve the full UI.</p>
    <p>Liveness is available at <code>/health</code>; readiness is available at <code>/ready</code>.</p>
</main>
</body>
</html>
