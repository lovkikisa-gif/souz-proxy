services:
  web-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PROXY_HOST: "0.0.0.0"
      PROXY_PORT: "8080"
      PUBLIC_BASE_URL: "http://localhost:8080" # dev only; use HTTPS URL in production

      BACKEND_URL: "http://souz-backend:8080"
      SOUZ_BACKEND_PROXY_TOKEN: "${SOUZ_BACKEND_PROXY_TOKEN}"

      PROXY_DATABASE_URL: "postgres://souz_proxy:${PROXY_DB_PASSWORD}@proxy-db:5432/souz_proxy"

      SESSION_HASH_SECRET: "${SESSION_HASH_SECRET}"
      WELCOME_KEY_SECRET: "${WELCOME_KEY_SECRET}"

      COOKIE_NAME: "souz_session"
      COOKIE_SECURE: "false" # dev only; set true in production behind HTTPS
      SESSION_TTL_DAYS: "30"
      WS_ALLOWED_ORIGINS: "http://localhost:8080"
      ENV: "development"
    depends_on:
      - proxy-db
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - public
      - private

  proxy-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "souz_proxy"
      POSTGRES_USER: "souz_proxy"
      POSTGRES_PASSWORD: "${PROXY_DB_PASSWORD}"
    volumes:
      - proxy-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U souz_proxy -d souz_proxy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

  souz-backend:
    image: souz-backend:latest
    restart: unless-stopped
    environment:
      SOUZ_BACKEND_HOST: "0.0.0.0"
      SOUZ_BACKEND_PORT: "8080"
      SOUZ_BACKEND_PROXY_TOKEN: "${SOUZ_BACKEND_PROXY_TOKEN}"

      SOUZ_STORAGE_MODE: "postgres"
      SOUZ_BACKEND_DB_HOST: "backend-db"
      SOUZ_BACKEND_DB_PORT: "5432"
      SOUZ_BACKEND_DB_NAME: "souz"
      SOUZ_BACKEND_DB_USER: "souz"
      SOUZ_BACKEND_DB_PASSWORD: "${BACKEND_DB_PASSWORD}"
    expose:
      - "8080"
    depends_on:
      - backend-db
    networks:
      - private

  backend-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "souz"
      POSTGRES_USER: "souz"
      POSTGRES_PASSWORD: "${BACKEND_DB_PASSWORD}"
    volumes:
      - backend-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U souz -d souz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - private

volumes:
  proxy-db-data:
  backend-db-data:

networks:
  public:
  private:
    internal: true
