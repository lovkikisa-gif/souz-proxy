services:
  web-proxy:
    image: souz-proxy:${SOUZ_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_PROXY_PORT:-8080}:8080"
    environment:
      PROXY_HOST: "${PROXY_HOST:-0.0.0.0}"
      PROXY_PORT: "${PROXY_PORT:-8080}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:?PUBLIC_BASE_URL is required}"
      BACKEND_URL: "${BACKEND_URL:-http://souz-backend:8080}"

      SOUZ_BACKEND_PROXY_TOKEN: "${SOUZ_BACKEND_PROXY_TOKEN:?SOUZ_BACKEND_PROXY_TOKEN is required}"

      PROXY_DATABASE_URL: "postgres://souz_proxy:${PROXY_DB_PASSWORD:?PROXY_DB_PASSWORD is required}@proxy-db:5432/souz_proxy"
      SESSION_HASH_SECRET: "${SESSION_HASH_SECRET:?SESSION_HASH_SECRET is required}"
      WELCOME_KEY_SECRET: "${WELCOME_KEY_SECRET:?WELCOME_KEY_SECRET is required}"

      COOKIE_NAME: "${COOKIE_NAME:-souz_session}"
      COOKIE_SECURE: "${COOKIE_SECURE:-true}"
      SESSION_TTL_DAYS: "${SESSION_TTL_DAYS:-30}"
      ENV: "${PROXY_ENV:-production}"
      WS_ALLOWED_ORIGINS: "${WS_ALLOWED_ORIGINS:-}"
      WS_MAX_FRAME_SIZE_BYTES: "${WS_MAX_FRAME_SIZE_BYTES:-1048576}"
      WS_PING_PERIOD_SECONDS: "${WS_PING_PERIOD_SECONDS:-15}"
      WS_IDLE_TIMEOUT_SECONDS: "${WS_IDLE_TIMEOUT_SECONDS:-30}"
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: "${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-10}"
      AUTH_RATE_LIMIT_WINDOW_SECONDS: "${AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}"
      BACKEND_REQUEST_TIMEOUT_SECONDS: "${BACKEND_REQUEST_TIMEOUT_SECONDS:-30}"
    depends_on:
      proxy-db:
        condition: service_healthy
      souz-backend:
        condition: service_healthy
    networks:
      - appnet

  proxy-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "souz_proxy"
      POSTGRES_USER: "souz_proxy"
      POSTGRES_PASSWORD: "${PROXY_DB_PASSWORD:?PROXY_DB_PASSWORD is required}"
    volumes:
      - proxy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U souz_proxy -d souz_proxy"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  souz-backend:
    image: souz-backend:${SOUZ_VERSION:-latest}
    restart: unless-stopped
    environment:
      SOUZ_BACKEND_HOST: "${SOUZ_BACKEND_HOST:-0.0.0.0}"
      SOUZ_BACKEND_PORT: "${SOUZ_BACKEND_PORT:-8080}"

      SOUZ_BACKEND_PROXY_TOKEN: "${SOUZ_BACKEND_PROXY_TOKEN:?SOUZ_BACKEND_PROXY_TOKEN is required}"
      SOUZ_MASTER_KEY: "${SOUZ_MASTER_KEY:?SOUZ_MASTER_KEY is required}"

      SOUZ_STORAGE_MODE: "${SOUZ_STORAGE_MODE:-postgres}"
      SOUZ_BACKEND_DB_HOST: "${SOUZ_BACKEND_DB_HOST:-backend-db}"
      SOUZ_BACKEND_DB_PORT: "${SOUZ_BACKEND_DB_PORT:-5432}"
      SOUZ_BACKEND_DB_NAME: "${SOUZ_BACKEND_DB_NAME:-souz}"
      SOUZ_BACKEND_DB_USER: "${SOUZ_BACKEND_DB_USER:-souz}"
      SOUZ_BACKEND_DB_PASSWORD: "${BACKEND_DB_PASSWORD:?BACKEND_DB_PASSWORD is required}"
      SOUZ_BACKEND_DB_SCHEMA: "${SOUZ_BACKEND_DB_SCHEMA:-public}"
      SOUZ_BACKEND_DB_MAX_POOL_SIZE: "${SOUZ_BACKEND_DB_MAX_POOL_SIZE:-10}"
      SOUZ_BACKEND_DB_CONNECTION_TIMEOUT_MS: "${SOUZ_BACKEND_DB_CONNECTION_TIMEOUT_MS:-30000}"
      SOUZ_BACKEND_DATA_DIR: "${SOUZ_BACKEND_DATA_DIR:-data}"

      SOUZ_FEATURE_WS_EVENTS: "${SOUZ_FEATURE_WS_EVENTS:-true}"
      SOUZ_FEATURE_STREAMING_MESSAGES: "${SOUZ_FEATURE_STREAMING_MESSAGES:-true}"
      SOUZ_FEATURE_TOOL_EVENTS: "${SOUZ_FEATURE_TOOL_EVENTS:-true}"
      SOUZ_FEATURE_OPTIONS: "${SOUZ_FEATURE_OPTIONS:-true}"
      SOUZ_FEATURE_DURABLE_EVENT_REPLAY: "${SOUZ_FEATURE_DURABLE_EVENT_REPLAY:-true}"

      SOUZ_BACKEND_LIMIT_PER_USER_CONCURRENT_EXECUTIONS: "${SOUZ_BACKEND_LIMIT_PER_USER_CONCURRENT_EXECUTIONS:-4}"
      SOUZ_BACKEND_LIMIT_PER_USER_REQUESTS_PER_MINUTE: "${SOUZ_BACKEND_LIMIT_PER_USER_REQUESTS_PER_MINUTE:-30}"
      SOUZ_BACKEND_LIMIT_PER_USER_TOKENS_PER_MINUTE: "${SOUZ_BACKEND_LIMIT_PER_USER_TOKENS_PER_MINUTE:-120000}"
      SOUZ_BACKEND_LIMIT_GLOBAL_PROVIDER_CONCURRENCY: "${SOUZ_BACKEND_LIMIT_GLOBAL_PROVIDER_CONCURRENCY:-8}"
      SOUZ_BACKEND_PROVIDER_MAX_429_RETRIES: "${SOUZ_BACKEND_PROVIDER_MAX_429_RETRIES:-2}"
      SOUZ_BACKEND_PROVIDER_BACKOFF_BASE_MS: "${SOUZ_BACKEND_PROVIDER_BACKOFF_BASE_MS:-500}"
      SOUZ_BACKEND_PROVIDER_BACKOFF_MAX_MS: "${SOUZ_BACKEND_PROVIDER_BACKOFF_MAX_MS:-5000}"
      SOUZ_BACKEND_SYSTEM_PROMPT: "${SOUZ_BACKEND_SYSTEM_PROMPT:-}"

      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      OPENAI_EMBEDDINGS_MODEL: "${OPENAI_EMBEDDINGS_MODEL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-}"
      QWEN_KEY: "${QWEN_KEY:-}"
      QWEN_MODEL: "${QWEN_MODEL:-}"
      QWEN_EMBEDDINGS_MODEL: "${QWEN_EMBEDDINGS_MODEL:-}"
      AITUNNEL_KEY: "${AITUNNEL_KEY:-}"
      AITUNNEL_MODEL: "${AITUNNEL_MODEL:-}"
      AITUNNEL_EMBEDDINGS_MODEL: "${AITUNNEL_EMBEDDINGS_MODEL:-}"
      GIGA_KEY: "${GIGA_KEY:-}"
      GIGA_LOG_LEVEL: "${GIGA_LOG_LEVEL:-INFO}"
    expose:
      - "8080"
    depends_on:
      backend-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
    networks:
      - appnet

  backend-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${SOUZ_BACKEND_DB_NAME:-souz}"
      POSTGRES_USER: "${SOUZ_BACKEND_DB_USER:-souz}"
      POSTGRES_PASSWORD: "${BACKEND_DB_PASSWORD:?BACKEND_DB_PASSWORD is required}"
    volumes:
      - backend-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SOUZ_BACKEND_DB_USER:-souz} -d ${SOUZ_BACKEND_DB_NAME:-souz}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - appnet

volumes:
  proxy-db-data:
  backend-db-data:

networks:
  appnet:
    driver: bridge
